<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahkayo | Coming Soon</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Base Resets & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center;
            padding: 20px;
            /* Subtle radial gradient for depth */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            overflow: hidden;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.5); }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); border-color: rgba(212, 175, 55, 1); }
            100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); border-color: rgba(212, 175, 55, 0.5); }
        }

        @keyframes imageReveal {
            0% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }
        
        /* Logo Image Styling */
        .logo-image {
            max-width: 500px; 
            width: 100%;      
            height: auto;
            margin-bottom: 2rem;
            /* Smooth reveal animation for the logo */
            animation: imageReveal 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Under Construction Badge */
        .construction-badge {
            display: inline-block;
            font-size: 0.85rem;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 8px 16px;
            border-top: 1px solid #D4AF37;
            border-bottom: 1px solid #D4AF37;
            margin-bottom: 2rem;
            /* Staggered fade in */
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        /* Message Styling */
        .message { 
            font-size: 1.1rem; 
            color: #CCCCCC; 
            max-width: 600px; 
            line-height: 1.8;
            margin-bottom: 3rem; 
            /* Staggered fade in */
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        /* Gold CTA Button */
        .cta-btn { 
            display: inline-block;
            padding: 14px 32px; 
            background-color: transparent; 
            color: #D4AF37; 
            border: 1px solid #D4AF37;
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 2px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: all 0.3s ease;
            /* Staggered fade in + continuous pulse */
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.1s forwards, pulseGlow 3s infinite 2s;
        }
        
        .cta-btn:hover { 
            background-color: #D4AF37; 
            color: #000000; 
            /* Enhances the glow on hover */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7) !important; 
            animation-play-state: paused;
        }

        /* Footer */
        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.8rem; 
            color: #666666; 
            letter-spacing: 1px;
            width: 100%;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .logo-image { max-width: 320px; }
            .construction-badge { font-size: 0.75rem; letter-spacing: 2px; }
            .message { font-size: 1rem; padding: 0 15px; }
            .footer { position: relative; margin-top: 40px; bottom: 0; }
        }
    </style>
</head>
<body>

    <img src="uploads/landing.jpeg" alt="Ahkayo Logo - Quality In Every Bite" class="logo-image">
    
    <div class="construction-badge">Site Under Construction</div>

    <p class="message">
        We are currently crafting our new digital experience. Stay tuned for the launch of Ahkayo Feeds—setting a new standard for agricultural excellence and purity.
    </p>
    
    <a href="mailto:info@ahkayo.com" class="cta-btn">Contact: info@ahkayo.com</a>

    <div class="footer">
        &copy; 2026 Ahkayo. A unit of Overseas Aquatics. All Rights Reserved.
    </div>

</body>
</html>

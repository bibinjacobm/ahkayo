<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahkayo | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Base Resets & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-align: center;
            padding: 20px;
            /* Subtle radial gradient to give depth to the black background */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }
        
        /* Logo Image Styling */
        .logo-image {
            max-width: 500px; /* Restricts maximum size on desktop */
            width: 100%;      /* Ensures it scales down on smaller screens */
            height: auto;
            margin-bottom: 2rem;
            /* Optional: uncomment the line below if you want a subtle gold glow behind the image */
            /* filter: drop-shadow(0px 4px 15px rgba(212, 175, 55, 0.15)); */
        }

        /* Message Styling */
        .message { 
            font-size: 1.1rem; 
            color: #CCCCCC; 
            max-width: 600px; 
            line-height: 1.8;
            margin-bottom: 3rem; 
        }

        /* Gold CTA Button */
        .cta-btn { 
            display: inline-block;
            padding: 14px 32px; 
            background-color: transparent; 
            color: #D4AF37; 
            border: 1px solid #D4AF37;
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 2px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: all 0.3s ease; 
        }
        .cta-btn:hover { 
            background-color: #D4AF37; 
            color: #000000; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }

        /* Footer */
        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.8rem; 
            color: #666666; 
            letter-spacing: 1px;
            width: 100%;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .logo-image { max-width: 320px; }
            .message { font-size: 1rem; }
            .footer { position: relative; margin-top: 40px; bottom: 0; }
        }
    </style>
</head>
<body>

    <img src="uploads/landing.jpeg" alt="Ahkayo Logo - Quality In Every Bite" class="logo-image">
    
    <p class="message">
        We are currently crafting our new digital experience. Stay tuned for the launch of Ahkayo Feeds—setting a new standard for agricultural excellence and purity.
    </p>
    
    <a href="mailto:info@ahkayo.com" class="cta-btn">Contact Us</a>

    <div class="footer">
        &copy; 2026 Ahkayo. A unit of Overseas Aquatics. All Rights Reserved.
    </div>

</body>
</html>

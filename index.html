<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahkayo | Coming Soon</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        /* Base Resets & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }
        
        /* Typography */
        h1 { 
            font-family: 'Playfair Display', serif; 
            color: #D4AF37; 
            font-size: 4.5rem; 
            letter-spacing: 2px;
            margin-bottom: 0.5rem; 
        }
        .tagline {
            font-size: 1.2rem;
            color: #D4AF37;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2rem;
        }
        .message { 
            font-size: 1.1rem; 
            color: #CCCCCC; 
            max-width: 600px; 
            line-height: 1.8;
            margin-bottom: 3rem; 
        }

        /* Gold CTA Button */
        .cta-btn { 
            display: inline-block;
            padding: 14px 32px; 
            background-color: transparent; 
            color: #D4AF37; 
            border: 1px solid #D4AF37;
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 2px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: all 0.3s ease; 
        }
        .cta-btn:hover { 
            background-color: #D4AF37; 
            color: #000000; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }

        /* Footer */
        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.8rem; 
            color: #666666; 
            letter-spacing: 1px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .tagline { font-size: 0.9rem; }
            .message { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1>Ahkayo</h1>
    <div class="tagline">Premium Nutrition</div>
    
    <p class="message">
        We are currently crafting our new digital experience. Stay tuned for the launch of Ahkayo Feeds—setting a new standard for agricultural excellence and purity.
    </p>
    
    <!-- You can change this mailto link to your actual business email -->
    <a href="mailto:info@ahkayo.com" class="cta-btn">Contact Us</a>

    <div class="footer">
        &copy; 2026 Ahkayo. A unit of Overseas Aquatics. All Rights Reserved.
    </div>

</body>
</html>
